<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TV Series</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tu CSS -->
  <link rel="stylesheet" href="lib/style.css">
</head>

<body>

  <div class="container-fluid header">
    <h2>TV Series</h2>
  </div>

  <div class="container-fluid mt-4">
    <div class="row">

      <!-- TABLA -->
      <div class="col-md-8">
        <table class="table table-striped">
          <thead class="table-dark">
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Channel</th>
              <th>Seasons</th>
            </tr>
          </thead>
          <tbody id="series-body"></tbody>
        </table>

        <p>Seasons average: <span id="average"></span></p>
      </div>

      <!-- CARD -->
      <div class="col-md-4">
        <div class="card d-none" id="detail-card">
          <img id="detail-image" class="card-img-top">
          <div class="card-body">
            <h5 id="detail-title"></h5>
            <p id="detail-description"></p>
            <a id="detail-link" target="_blank" class="btn btn-primary">
              Visit official site
            </a>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- IMPORTANTE -->
  <script type="module" src="./dist/main.js"></script>

</body>
</html>
